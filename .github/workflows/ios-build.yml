name: Build Unsigned iOS IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.0

jobs:
  build-unsigned-ipa:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull
          echo "=== LFS file sizes (should NOT be ~130 bytes if pointer) ==="
          git lfs ls-files | head -20
          echo "=== Actual file sizes ==="
          find ios/Runner -name "*.mlmodelc" -o -name "*.m4a" -o -name "*.caf" | head -10 | xargs ls -lh 2>/dev/null || true
          echo "=== Check for LFS pointers (bad if any show 'version https://git-lfs') ==="
          file ios/Runner/Vocals.m4a 2>/dev/null || true
          wc -c ios/Runner/Vocals.m4a 2>/dev/null || true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Inject dummy DEVELOPMENT_TEAM into pbxproj
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Only inject if not already present
          if ! grep -q "DEVELOPMENT_TEAM = " "$PBXPROJ"; then
            sed -i '' \
              's/PRODUCT_BUNDLE_IDENTIFIER = com\.example\.flutterApp;/DEVELOPMENT_TEAM = XXXXXXXXXX;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = com.example.flutterApp;/g' \
              "$PBXPROJ"
          fi
          echo "DEVELOPMENT_TEAM entries:"
          grep -n "DEVELOPMENT_TEAM" "$PBXPROJ"

      - name: Build iOS App (Release, No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Package Runner.app into IPA
        run: |
          set -e

          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Searching for Runner.app..."
            find build -name "Runner.app" -type d 2>/dev/null
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi

          echo "Packaging: $APP_PATH"

          PACKAGE_DIR="${RUNNER_TEMP}/ipa_package"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/Payload"
          cp -R "$APP_PATH" "$PACKAGE_DIR/Payload/"

          cd "$PACKAGE_DIR"
          zip -r "${{ github.workspace }}/MusicX.ipa" Payload

          echo "IPA created:"
          ls -lh "${{ github.workspace }}/MusicX.ipa"
          echo "=== Runner.app contents size ==="
          du -sh "$APP_PATH"
          du -sh "$APP_PATH"/* 2>/dev/null | sort -rh | head -20

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicX-unsigned-ipa
          path: MusicX.ipa
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
          retention-days: 7
