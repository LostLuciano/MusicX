name: Build Unsigned iOS IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.0

jobs:
  build-unsigned-ipa:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull

      - name: Verify Directory Structure
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "iOS directory:"
          ls -la ios/

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build iOS App (Release, No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Create Archive
        run: |
          xcodebuild \
            -project ios/Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -archivePath ios/build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            FLUTTER_BUILD_DIR=build

      - name: Export Unsigned IPA
        run: |
          mkdir -p ios/build/ipa
          xcodebuild -exportArchive \
            -archivePath ios/build/Runner.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Verify IPA Generated
        run: |
          echo "Checking for IPA file:"
          ls -la ios/build/ipa/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicX-unsigned-ipa
          path: ios/build/ipa/*.ipa
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build/
            build/
          retention-days: 7
