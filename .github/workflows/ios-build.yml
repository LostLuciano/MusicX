name: iOS Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FLUTTER_PROJECT_DIR: .
  IPA_NAME: MusicA.ipa
  FLUTTER_VERSION: 3.24.0

jobs:
  build-ios-debug:
    name: Build iOS Debug IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      
      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get Flutter Dependencies
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}
          flutter pub get
      
      - name: Flutter Analyze
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}
          flutter analyze
        continue-on-error: true
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      
      - name: Install CocoaPods
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          pod install --repo-update
      
      - name: Build iOS App
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}
          flutter build ios --debug --no-codesign
      
      - name: Create IPA Archive
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Export IPA
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ../ExportOptions.plist \
            -allowProvisioningUpdates
        continue-on-error: true
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: ${{ env.FLUTTER_PROJECT_DIR }}/ios/build/ipa/*.ipa
          if-no-files-found: warn
      
      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-debug
          path: |
            ${{ env.FLUTTER_PROJECT_DIR }}/ios/build/
            ${{ env.FLUTTER_PROJECT_DIR }}/build/
          if-no-files-found: warn

  build-ios-release:
    name: Build iOS Release IPA
    runs-on: macos-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      
      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Get Flutter Dependencies
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}
          flutter pub get
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      
      - name: Install CocoaPods
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          pod install --repo-update
      
      - name: Build iOS Release
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}
          flutter build ios --release --no-codesign
      
      - name: Create Release Archive
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Export Release IPA
        run: |
          cd ${{ env.FLUTTER_PROJECT_DIR }}/ios
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ../ExportOptions.plist \
            -allowProvisioningUpdates
        continue-on-error: true
      
      - name: Upload Release IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ env.FLUTTER_PROJECT_DIR }}/ios/build/ipa/*.ipa
          if-no-files-found: warn
      
      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          release_name: Release v1.0.0 Build ${{ github.run_number }}
          body: |
            ## Music Stem Studio v1.0.0
            
            ### Build Information
            - **Build Number**: ${{ github.run_number }}
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref }}
            
            ### Features
            - AI-powered stem separation
            - Chord detection
            - Beat & tempo analysis
            - Multi-track recording
            - Project management
            
            ### Download
            See artifacts for IPA file.
          draft: false
          prerelease: false
        continue-on-error: true
      
      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-release
          path: |
            ${{ env.FLUTTER_PROJECT_DIR }}/ios/build/
            ${{ env.FLUTTER_PROJECT_DIR }}/build/
          if-no-files-found: warn
