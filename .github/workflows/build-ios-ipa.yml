name: Build iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  IPA_NAME: MusicX.ipa

jobs:
  build-ios:
    name: Build iOS App Unsigned
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Inject dummy DEVELOPMENT_TEAM into pbxproj
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          if ! grep -q "DEVELOPMENT_TEAM = " "$PBXPROJ"; then
            sed -i '' \
              's/PRODUCT_BUNDLE_IDENTIFIER = com\.example\.flutterApp;/DEVELOPMENT_TEAM = XXXXXXXXXX;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = com.example.flutterApp;/g' \
              "$PBXPROJ"
          fi
          echo "DEVELOPMENT_TEAM entries:"
          grep -n "DEVELOPMENT_TEAM" "$PBXPROJ"

      - name: Build iOS App (Release, No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package Runner.app into IPA
        run: |
          set -e

          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Searching for Runner.app..."
            find build -name "Runner.app" -type d 2>/dev/null
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi

          echo "Packaging: $APP_PATH"

          PACKAGE_DIR="${RUNNER_TEMP}/ipa_package"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/Payload"
          cp -R "$APP_PATH" "$PACKAGE_DIR/Payload/"

          cd "$PACKAGE_DIR"
          zip -r "${{ github.workspace }}/${{ env.IPA_NAME }}" Payload

          echo "IPA created:"
          ls -lh "${{ github.workspace }}/${{ env.IPA_NAME }}"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicX-iOS-IPA
          path: ${{ env.IPA_NAME }}
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
          retention-days: 7
